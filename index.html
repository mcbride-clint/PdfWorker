<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PdfWorker — Client-side PDF Tools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-3 py-2">
    <span class="navbar-brand mb-0 h5 d-flex align-items-center gap-2">
      <img src="favicon.svg" width="20" height="20" alt="" />
      PdfWorker
    </span>
    <span class="text-secondary small">All processing happens in your browser — nothing is uploaded anywhere.</span>
  </nav>

  <div class="container-fluid py-3 px-3">

    <!-- Upload Zone -->
    <div id="upload-zone" class="upload-zone mb-3">
      <input type="file" id="file-input" accept=".pdf" multiple hidden />
      <label for="file-input" class="upload-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="mb-2 text-secondary" viewBox="0 0 16 16">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
        </svg>
        <div><strong>Drop PDF files here</strong> or click to browse</div>
        <div class="text-secondary small mt-1">Supports multiple files &bull; All processing is local</div>
      </label>
    </div>

    <!-- Main content (shown once at least one document exists) -->
    <div id="main-content" class="d-none">

      <!-- Global Toolbar -->
      <div class="toolbar mb-3 d-flex flex-wrap align-items-center gap-2">
        <button id="btn-add-pdfs" class="btn btn-outline-secondary btn-sm" title="Add PDFs to the active document">
          + Add PDFs
        </button>
        <button id="btn-new-doc" class="btn btn-outline-primary btn-sm" title="Create a new empty document">
          + New Document
        </button>
        <div class="vr"></div>
        <button id="btn-undo" class="btn btn-outline-secondary btn-sm" title="Undo (Ctrl+Z)" disabled>&#8617; Undo</button>
        <button id="btn-redo" class="btn btn-outline-secondary btn-sm" title="Redo (Ctrl+Y / Ctrl+Shift+Z)" disabled>&#8618; Redo</button>
        <button id="btn-clear-all" class="btn btn-outline-danger btn-sm ms-auto" title="Remove all documents and start over">
          Clear All
        </button>
      </div>

      <!-- Document panes rendered here by app.js -->
      <div id="documents-container" class="documents-container"></div>

    </div>

  </div>

  <!-- Right-click Context Menu -->
  <div id="context-menu" class="context-menu d-none" style="position:fixed">
    <div class="context-menu-item" data-action="rotate">Rotate 90° clockwise</div>
    <div class="context-menu-item" data-action="duplicate">Duplicate page</div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item context-menu-item--danger" data-action="remove">Remove page</div>
    <div class="context-menu-item" data-action="remove-before">Remove all pages before this</div>
    <div class="context-menu-item" data-action="remove-after">Remove all pages after this</div>
    <div id="context-menu-move-section" class="d-none">
      <div class="context-menu-divider"></div>
      <div class="context-menu-label">Move to&hellip;</div>
      <div id="context-menu-move-targets"></div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center text-bg-secondary border-0" role="alert">
      <div class="d-flex">
        <div id="toast-msg" class="toast-body"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Load pdf-lib, PDF.js, fflate, then app.js -->
  <script src="js/pdf-lib.min.js"></script>
  <script src="js/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'js/pdf.worker.min.js';
  </script>
  <script src="js/fflate.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
